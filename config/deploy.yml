service: solo-trace
image: bennyconn/solo-trace

servers:
  web:
    hosts:
      - 192.168.1.64

registry:
  username: bennyconn
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  arch: arm64

env:
  clear:
    ENVIRONMENT: production
    SERVER_PORT: 4000
    DB_PATH: /data/solo-trace.db
    JOBS_DIR: /data/jobs
    PYTHON_BIN: python3
    PYTHON_SCRIPT_PATH: /app/scripts/process_video.py
    REFERENCE_AUDIO_PATH: /data/reference_audio.wav
    REFERENCE_IMAGES_DIR: /data/reference_images
    AUDIO_THRESHOLD: "0.79"
    MIN_PEAK: "0.808"
    DEFAULT_START_TIME: "1:00:00"
    VISUAL_THRESHOLD: "0.608"
    SMALLS_CRON_ENABLED: "true"
    HF_HOME: /data/hf_cache
  secret:
    - API_KEY
    - R2_ACCOUNT_ID
    - R2_ACCESS_KEY_ID
    - R2_SECRET_ACCESS_KEY
    - R2_BUCKET
    - R2_PUBLIC_BASE_URL

# Persist the SQLite database, job output, reference data, and HuggingFace model cache
volumes:
  - /data/solo-trace:/data

proxy:
  app_port: 4000
  ssl: false
  host: solo.bennyconn.com
  healthcheck:
    path: /health
    interval: 5
    timeout: 5

logging:
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

ssh:
  user: benjaminconn
